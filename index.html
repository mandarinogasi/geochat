<!DOCTYPE html>
<html>
<head>
    <title>GeoChat Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            font-family: Arial;
            text-align: center;
            padding: 50px;
            background: #111;
            color: white;
        }

        button {
            padding: 15px;
            font-size: 18px;
            background: #00ff99;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        #status {
            margin-top: 20px;
            font-size: 20px;
        }
    </style>
</head>

<body>

    <h1>📡 GeoChat</h1>
    <p>Test posizione GPS</p>

    <button onclick="getLocation()">Controlla posizione</button>

    <div id="status">Premi il bottone</div>

    <script>
    const centerLat = 40.61581525171119;
    const centerLng = 15.047397231044794;
    const radius = 3; // metri

    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(checkArea, error);
        } else {
            document.getElementById("status").innerText = "GPS non supportato";
        }
    }

    function checkArea(position) {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;

        const distance = getDistance(lat, lng, centerLat, centerLng);

        if (distance <= radius) {
            document.getElementById("status").innerText =
                "✅ SEI DENTRO L'AREA (" + distance.toFixed(2) + "m)";
        } else {
            document.getElementById("status").innerText =
                "❌ SEI FUORI (" + distance.toFixed(2) + "m)";
        }
    }

    function error() {
        document.getElementById("status").innerText =
            "Errore nel prendere la posizione";
    }

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371000; // metri
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;

        const a =
            Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * Math.PI/180) *
            Math.cos(lat2 * Math.PI/180) *
            Math.sin(dLon/2) * Math.sin(dLon/2);

        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }
</script>

</body>
</html>
