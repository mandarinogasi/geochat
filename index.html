<!DOCTYPE html>
<html>
<head>
    <title>GeoChat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            text-align: center;
            padding: 30px;
            background: #111;
            color: white;
        }

        button {
            padding: 15px;
            font-size: 18px;
            background: #00ff99;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
        }

        #status {
            margin-top: 20px;
            font-size: 20px;
        }

        #chat {
            margin-top: 30px;
        }

        input {
            padding: 10px;
            width: 70%;
            border-radius: 8px;
            border: none;
        }

        #messages {
            margin-top: 20px;
            text-align: left;
        }

        #messages div {
            background: #222;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <h1>📡 GeoChat</h1>
    <p>Chat attiva solo dentro area</p>

    <button onclick="getLocation()">Controlla posizione</button>

    <div id="status">Premi il bottone</div>

    <div id="chat" style="display:none;">
        <h2>💬 Chat Area</h2>
        <input id="message" placeholder="Scrivi..." />
        <br>
        <button onclick="sendMessage()">Invia</button>
        <div id="messages"></div>
    </div>

    <!-- FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } 
        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyD7cztFTFUz_zSiGeBbibzERV14KpKNhQw",
          authDomain: "geochat-51d5c.firebaseapp.com",
          projectId: "geochat-51d5c",
          storageBucket: "geochat-51d5c.firebasestorage.app",
          messagingSenderId: "663629006541",
          appId: "1:663629006541:web:0fda395d92f15fb7c4cb84"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const centerLat = 40.61581525171119;
        const centerLng = 15.047397231044794;
        const radius = 15;

        let inside = false;

        window.getLocation = function () {
            navigator.geolocation.getCurrentPosition(checkArea);
        }

        function checkArea(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;

            const distance = getDistance(lat, lng, centerLat, centerLng);

            if (distance <= radius) {
                inside = true;
                document.getElementById("status").innerText =
                    "✅ SEI DENTRO (" + distance.toFixed(2) + "m)";
                document.getElementById("chat").style.display = "block";
            } else {
                inside = false;
                document.getElementById("status").innerText =
                    "❌ SEI FUORI (" + distance.toFixed(2) + "m)";
                document.getElementById("chat").style.display = "none";
            }
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;

            const a =
                Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI/180) *
                Math.cos(lat2 * Math.PI/180) *
                Math.sin(dLon/2) * Math.sin(dLon/2);

            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        window.sendMessage = async function () {
            if (!inside) return;

            const msg = document.getElementById("message").value;
            if (msg.trim() === "") return;

            await addDoc(collection(db, "messages"), {
                text: msg,
                time: Date.now()
            });

            document.getElementById("message").value = "";
        }

        const q = query(collection(db, "messages"), orderBy("time"));

        onSnapshot(q, (snapshot) => {
            const container = document.getElementById("messages");
            container.innerHTML = "";

            snapshot.forEach(doc => {
                const div = document.createElement("div");
                div.innerText = doc.data().text;
                container.appendChild(div);
            });
        });
    </script>

</body>
</html>
